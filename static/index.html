<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OI 训练系统 · 智能分析</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        /* ========== 基础重置 & 主题变量 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }
        body.light {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border: #e2e8f0;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --accent: #b8963a;
            --accent-hover: #d4b86a;
            --danger: #ef4444;
            --success: #10b981;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-glass: rgba(30, 41, 59, 0.8);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            --accent: #b8963a;
            --accent-hover: #d4b86a;
            --danger: #f87171;
            --success: #34d399;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* ========== 导航 & 主题切换 ========== */
        nav {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-radius: 8px;
            padding: 0.8rem 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.2rem;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
        }
        nav .brand { font-weight: 600; font-size: 1.05rem; color: var(--text-primary); }
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        nav a:hover { background: var(--accent); color: #1a1a1a; }
        nav .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }

        .theme-switch {
            display: flex;
            gap: 0.5rem;
        }
        .theme-switch button {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .theme-switch button:hover { background: var(--accent); color: #fff; }

        /* ========== 卡片 ========== */
        .card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); }
        .card h3 { font-weight: 600; font-size: 1.1rem; margin-bottom: 8px; color: var(--text-primary); }

        /* ========== 输入区 ========== */
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin: 20px 0 30px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .input-group input {
            flex: 1 1 200px;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,150,58,0.15); }
        .primary-btn {
            background: var(--accent);
            color: #1a1a1a !important;
            border: none;
            padding: 10px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }
        .primary-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(184,150,58,0.25); }

        /* ========== 统计卡片 ========== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.5rem 1.2rem;
            border: 1px solid var(--border);
            text-align: center;
            transition: 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--card-shadow); }
        .stat-number { font-size: 2.8rem; font-weight: 700; color: var(--accent); line-height: 1.2; }
        .stat-label { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }

        /* ========== 标签 ========== */
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
        .tag {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
        }
        .tag-strength { background: var(--success); color: #fff; }
        .tag-weakness { background: var(--danger); color: #fff; }
        .tag-award { background: #d4af37; color: #1a1a1a; }
        .tag-atcoder { color: #fff; padding: 4px 16px; border-radius: 20px; }

        /* ========== 荣誉墙 ========== */
        .honor-wall { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-top: 4px; }
        .honor-item { display: flex; align-items: center; gap: 6px; }
        .honor-item .label { color: var(--text-secondary); font-size: 0.9rem; }

        /* ========== 任务列表 ========== */
        .mission-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .mission-item:last-child { border-bottom: none; }
        .mission-pid { font-weight: 600; color: var(--accent); margin-right: 12px; }
        .mission-reason { color: var(--text-secondary); font-size: 0.9rem; }
        .mission-status {
            font-size: 0.8rem;
            padding: 2px 12px;
            border-radius: 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .mission-status.active { border-color: var(--accent); color: var(--accent); background: rgba(184,150,58,0.1); }

        /* ========== 复盘列表 ========== */
        .review-list { list-style: none; padding: 0; margin: 0; }
        .review-list li { padding: 6px 0; border-bottom: 1px solid var(--border); color: var(--text-secondary); font-size: 0.95rem; }
        .review-list li:last-child { border-bottom: none; }
        .review-list li::before { content: "▸ "; color: var(--accent); }

        /* ========== 用户头 ========== */
        .user-header { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 8px; }
        .user-header h2 { margin: 0; font-weight: 600; color: var(--text-primary); }
        .user-header .sub { color: var(--text-secondary); font-weight: 400; font-size: 0.95rem; }

        /* ========== 空状态 & 加载 ========== */
        .empty-state { color: var(--text-secondary); font-style: italic; padding: 8px 0; }
        #loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 1.1rem; }
        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            body { padding: 16px; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .input-group { flex-direction: column; align-items: stretch; }
            .input-group input { width: 100%; }
            .primary-btn { width: 100%; text-align: center; }
            .user-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            nav { flex-direction: column; gap: 0.6rem; align-items: stretch; }
            nav .nav-links { justify-content: center; flex-wrap: wrap; }
            .theme-switch { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 主题切换 -->
    <div class="theme-switch">
        <button onclick="setTheme('light')">☀️ 浅色</button>
        <button onclick="setTheme('dark')">🌙 深色</button>
    </div>

    <!-- 导航 -->
    <nav>
        <span class="brand">🧠 OI 训练系统</span>
        <div class="nav-links">
            <a href="/static/contests.html">📅 比赛</a>
            <a href="/static/wrong.html">📕 错题</a>
            <a href="/static/chat.html">💬 AI 教练</a>
            <span style="color:var(--text-secondary); font-size:0.85rem;" id="updateTime"></span>
        </div>
    </nav>

    <!-- 输入表单 -->
    <div class="input-group">
        <input type="text" id="luoguUid" placeholder="洛谷 UID（必填）" value="" />
        <input type="text" id="atcoderUser" placeholder="AtCoder 用户名（选填）" value="" />
        <input type="password" id="apiKey" placeholder="DeepSeek API Key（选填）" value="" style="flex:1.5; min-width:200px;" />
        <button id="analyzeBtn" class="primary-btn">🚀 开始分析</button>
    </div>

    <!-- 结果面板 -->
    <div id="dashboard">
        <div id="welcome">
            <div style="text-align:center; padding:40px 20px; color:var(--text-secondary);">
                <div style="font-size:3rem; margin-bottom:16px;">📊</div>
                <h2 style="margin:0; font-weight:400;">输入 UID 和用户名，开始分析</h2>
                <p style="margin-top:8px;">支持洛谷 + AtCoder 双平台数据</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  主题
    // ============================================================
    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem('oi-theme', theme);
    }
    document.body.className = localStorage.getItem('oi-theme') || 'dark';

    // ============================================================
    //  AtCoder 段位颜色
    // ============================================================
    function getAtCoderColor(rank) {
        const map = {
            'Red': '#ff0000', 'Orange': '#ff8000', 'Gold': '#ffd700',
            'Blue': '#2188ff', 'Cyan': '#00ced1', 'Green': '#2e8b57',
            'Brown': '#8b4513', 'Grey': '#808080'
        };
        return map[rank] || '#6c757d';
    }

    // ============================================================
    //  难度颜色映射
    // ============================================================
    const diffColors = {
        '入门': '#e74c3c',
        '普及-': '#f39c12',
        '普及': '#f1c40f',
        '普及+/提高-': '#2ecc71',
        '提高': '#1abc9c',
        '提高+/省选-': '#3498db',
        '省选/NOI-': '#9b59b6',
        'NOI/NOI+/CTS': '#2c3e50',
        '暂无评定': '#95a5a6',
        '未知': '#95a5a6'
    };

    // ============================================================
    //  缓存加载 & 存储
    // ============================================================
    function loadCachedData() {
        try {
            const cached = localStorage.getItem('oi_last_result');
            if (cached) {
                const data = JSON.parse(cached);
                if (data.luogu_uid) {
                    renderDashboard(data);
                    const updateTime = document.getElementById('updateTime');
                    if (updateTime) {
                        updateTime.textContent = '📁 缓存数据 ' + new Date().toLocaleString();
                    }
                    return true;
                }
            }
        } catch (e) {
            localStorage.removeItem('oi_last_result');
        }
        return false;
    }

    // ============================================================
    //  渲染仪表盘
    // ============================================================
    function renderDashboard(data) {
        const container = document.getElementById('dashboard');
        const analysis = data.analysis || {};
        const luoguContests = data.luogu_contests || [];
        const atcoderContests = data.atcoder_contests || [];
        const totalMatches = luoguContests.length + atcoderContests.length;
        const awards = data.luogu_awards || [];
        const rating = data.atcoder_rating || {};
        const rank = rating.rank || 'N/A';
        const ratingVal = rating.rating || '-';
        const passedStats = data.passed_stats || {};
        const byDifficulty = passedStats.by_difficulty || {};
        const totalPassed = passedStats.total || 0;

        let html = '';

        // ---- 用户头 ----
        html += `
            <div class="user-header">
                <h2>👤 ${data.luogu_uid || '?'} <span class="sub">·</span> <span class="sub">${data.atcoder_user || '?'}</span></h2>
                <span class="sub" style="margin-left:auto; font-size:0.85rem;" id="updateTime"></span>
            </div>
        `;

        // ---- 统计卡片 ----
        html += `
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="stat-number">${totalMatches}</div>
                    <div class="stat-label">总比赛场次</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${luoguContests.length}</div>
                    <div class="stat-label">Rated 比赛</div>
                </div>
            </div>
        `;

        // ---- 荣誉墙 ----
        html += `
            <div class="card">
                <h3>🏆 荣誉墙</h3>
                <div class="honor-wall">
                    <div class="honor-item">
                        <span class="label">洛谷奖项：</span>
                        ${awards.length ? awards.map(a => `<span class="tag tag-award">${a}</span>`).join(' ') : '<span class="empty-state">暂无</span>'}
                    </div>
                    <div class="honor-item">
                        <span class="label">AtCoder 段位：</span>
                        <span class="tag tag-atcoder" style="background:${getAtCoderColor(rank)};">${rank} (${ratingVal})</span>
                    </div>
                </div>
            </div>
        `;

        // ---- 综合评级 ----
        html += `
            <div class="card" style="border-left:5px solid var(--accent);">
                <h3>📊 综合评级</h3>
                <p style="font-size:1.05rem;line-height:1.6;color:var(--text-primary);margin:4px 0;">${analysis.overall_rating || '暂无评级'}</p>
            </div>
        `;

        // ---- 等级分变化趋势图（洛谷） ----
        const eloHistory = data.elo_history || [];
        if (eloHistory.length > 0) {
            html += `
                <div class="card">
                    <h3>📈 洛谷等级分变化趋势</h3>
                    <div id="eloChart" style="width:100%;height:300px;"></div>
                </div>
            `;
        }

        // ---- 等级分变化趋势图（AtCoder） ----
        const atcoderEloHistory = data.atcoder_elo_history || [];
        if (atcoderEloHistory.length > 0) {
            html += `
                <div class="card">
                    <h3>📈 AtCoder 等级分变化趋势</h3>
                    <div id="atcoderEloChart" style="width:100%;height:300px;"></div>
                </div>
            `;
        }

        // ---- 难度通过统计 ----
        html += `
            <div class="card">
                <h3>📈 难度通过统计（共 ${totalPassed} 题）</h3>
                <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;">
                    ${Object.entries(byDifficulty).map(([diff, count]) => `
                        <div style="display:flex;align-items:center;gap:6px;background:var(--bg-primary);padding:6px 14px;border-radius:6px;border:1px solid var(--border);">
                            <span class="diff-color-dot" style="background:${diffColors[diff] || '#95a5a6'};"></span>
                            <span style="font-weight:500;color:var(--text-primary);">${diff}</span>
                            <span style="color:var(--text-secondary);">${count}</span>
                        </div>
                    `).join('')}
                    ${Object.keys(byDifficulty).length === 0 ? '<span class="empty-state">暂无数据</span>' : ''}
                </div>
            </div>
        `;

        // ---- DeepSeek 分析 ----
        if (!analysis.error) {
            // 优势 & 薄弱
            html += `
                <div class="card">
                    <h3>💪 优势领域</h3>
                    <div class="tag-group">
                        ${(analysis.strengths || []).map(s => `<span class="tag tag-strength">${s}</span>`).join('') || '<span class="empty-state">暂无数据</span>'}
                    </div>
                </div>
                <div class="card" style="border-left:5px solid var(--danger);">
                    <h3>⚠️ 薄弱领域</h3>
                    <div class="tag-group">
                        ${(analysis.weaknesses || []).map(w => `<span class="tag tag-weakness">${w}</span>`).join('') || '<span class="empty-state">暂无数据</span>'}
                    </div>
                </div>
                <div class="card">
                    <h3>📋 训练建议</h3>
                    <p style="white-space:pre-wrap;line-height:1.7;color:var(--text-secondary);">${analysis.suggestions || '无建议'}</p>
                </div>
                <div class="card">
                    <h3>🎯 每日推荐任务</h3>
                    ${(analysis.daily_mission || []).length ? (analysis.daily_mission || []).map(m => `
                        <div class="mission-item">
                            <div><span class="mission-pid">${m.pid || '?'}</span><span class="mission-reason">${m.reason || '推荐'}</span></div>
                            <span class="mission-status active">待完成</span>
                        </div>
                    `).join('') : '<div class="empty-state">暂无任务</div>'}
                </div>
                <div class="card">
                    <h3>📝 比赛复盘</h3>
                    <ul class="review-list">
                        ${(analysis.match_reviews || []).map(r => `<li>${r}</li>`).join('') || '<li class="empty-state">暂无数据</li>'}
                    </ul>
                </div>
            `;
        }

        // ---- 原始数据 ----
        html += `
            <details style="margin-top:20px;padding:16px;background:var(--bg-secondary);border-radius:8px;border:1px solid var(--border);">
                <summary style="cursor:pointer;font-weight:500;color:var(--text-secondary);">📄 查看原始数据</summary>
                <pre style="margin-top:12px;font-size:0.8rem;max-height:400px;overflow:auto;background:var(--bg-primary);padding:16px;border-radius:4px;white-space:pre-wrap;word-break:break-all;">${JSON.stringify(data, null, 2)}</pre>
            </details>
        `;

        container.innerHTML = html;

        // ============================================================
        //  初始化图表（ECharts）
        // ============================================================
        if (typeof echarts !== 'undefined') {
            // 洛谷图表
            const chartDom = document.getElementById('eloChart');
            if (eloHistory.length > 0 && chartDom) {
                const chart = echarts.init(chartDom);
                const option = {
                    tooltip: {
                        trigger: 'axis',
                        formatter: function(params) {
                            const param = params[0];
                            const dataIndex = param.dataIndex;
                            const item = eloHistory[dataIndex];
                            return `时间：${new Date(item.time * 1000).toLocaleString()}<br/>等级分：${item.rating}<br/>比赛：${item.contest_name || '未命名'}`;
                        }
                    },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        data: eloHistory.map(item => new Date(item.time * 1000).toLocaleDateString('zh-CN')),
                        axisLabel: { rotate: 30, interval: Math.floor(eloHistory.length / 10) || 0 }
                    },
                    yAxis: { type: 'value', name: '等级分' },
                    series: [{
                        data: eloHistory.map(item => item.rating),
                        type: 'line',
                        smooth: true,
                        lineStyle: { color: '#b8963a', width: 2 },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(184, 150, 58, 0.3)' },
                                { offset: 1, color: 'rgba(184, 150, 58, 0.0)' }
                            ])
                        },
                        symbol: 'circle', symbolSize: 6,
                        itemStyle: { color: '#b8963a' },
                        markPoint: {
                            data: [
                                { type: 'max', name: '最高' },
                                { type: 'min', name: '最低' }
                            ]
                        }
                    }]
                };
                chart.setOption(option);
                window.addEventListener('resize', () => chart.resize());
            }

            // AtCoder 图表
            const atcoderChartDom = document.getElementById('atcoderEloChart');
            if (atcoderEloHistory.length > 0 && atcoderChartDom) {
                const chart = echarts.init(atcoderChartDom);
                const option = {
                    tooltip: {
                        trigger: 'axis',
                        formatter: function(params) {
                            const param = params[0];
                            const dataIndex = param.dataIndex;
                            const item = atcoderEloHistory[dataIndex];
                            const timeStr = item.time ? new Date(item.time * 1000).toLocaleString() : `第${dataIndex+1}场`;
                            return `时间：${timeStr}<br/>等级分：${item.rating}<br/>比赛：${item.contest_name || '未命名'}`;
                        }
                    },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        data: atcoderEloHistory.map(item => {
                            if (item.time) return new Date(item.time * 1000).toLocaleDateString('zh-CN');
                            return '第' + (atcoderEloHistory.indexOf(item) + 1) + '场';
                        }),
                        axisLabel: { rotate: 30, interval: Math.floor(atcoderEloHistory.length / 10) || 0 }
                    },
                    yAxis: { type: 'value', name: '等级分' },
                    series: [{
                        data: atcoderEloHistory.map(item => item.rating),
                        type: 'line',
                        smooth: true,
                        lineStyle: { color: '#2ecc71', width: 2 },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(46, 204, 113, 0.3)' },
                                { offset: 1, color: 'rgba(46, 204, 113, 0.0)' }
                            ])
                        },
                        symbol: 'circle', symbolSize: 6,
                        itemStyle: { color: '#2ecc71' },
                        markPoint: {
                            data: [
                                { type: 'max', name: '最高' },
                                { type: 'min', name: '最低' }
                            ]
                        }
                    }]
                };
                chart.setOption(option);
                window.addEventListener('resize', () => chart.resize());
            }
        }

        // 标记已有数据
        window._hasData = true;

        // 保存数据到 localStorage
        try {
            localStorage.setItem('oi_last_result', JSON.stringify(data));
            const updateTime = document.getElementById('updateTime');
            if (updateTime && data.luogu_uid) {
                updateTime.textContent = '🔄 更新于 ' + new Date().toLocaleString();
            }
        } catch (e) {
            // 数据过大可能保存失败，静默忽略
        }
    }

    // ============================================================
    //  分析按钮
    // ============================================================
    document.getElementById('analyzeBtn').addEventListener('click', async function () {
        const uid = document.getElementById('luoguUid').value.trim();
        const user = document.getElementById('atcoderUser').value.trim();
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!uid) { alert('请输入洛谷 UID'); return; }

        const container = document.getElementById('dashboard');
        container.innerHTML = `
            <div id="loading">
                <div class="spinner"></div>
                <div>正在分析，请稍候...</div>
                <div style="font-size:0.85rem;margin-top:8px;color:var(--text-secondary);">爬取数据 + DeepSeek 分析大约需要 10~20 秒</div>
            </div>
        `;

        const updateTime = document.getElementById('updateTime');
        if (updateTime) updateTime.textContent = '';

        try {
            const resp = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ luogu_uid: uid, atcoder_user: user, api_key: apiKey})
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data.error) {
                container.innerHTML = `<div class="card" style="border-left:5px solid var(--danger);">${data.error}</div>`;
                return;
            }
            renderDashboard(data);
        } catch (e) {
            container.innerHTML = `<div class="card" style="border-left:5px solid var(--danger);">请求失败: ${e.message}</div>`;
        }
    });

    // 回车触发分析
    document.getElementById('luoguUid').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('analyzeBtn').click(); });
    document.getElementById('atcoderUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('analyzeBtn').click(); });

    // ============================================================
    //  页面加载
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        if (!loadCachedData()) {
            document.getElementById('dashboard').innerHTML = `
                <div id="welcome">
                    <div style="text-align:center; padding:40px 20px; color:var(--text-secondary);">
                        <div style="font-size:3rem; margin-bottom:16px;">📊</div>
                        <h2 style="margin:0; font-weight:400;">输入 UID 和用户名，开始分析</h2>
                        <p style="margin-top:8px;">支持洛谷 + AtCoder 双平台数据</p>
                    </div>
                </div>
            `;
            window._hasData = false;
        } else {
            window._hasData = true;
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛详情 · OI 训练系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }
        body.light {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255,255,255,0.7);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border: #e2e8f0;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --accent: #b8963a;
            --accent-hover: #d4b86a;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-glass: rgba(30,41,59,0.8);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            --accent: #b8963a;
            --accent-hover: #d4b86a;
            --danger: #f87171;
            --success: #34d399;
            --warning: #fbbf24;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1200px; margin: 0 auto; }

        nav {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-radius: 8px;
            padding: 0.8rem 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
        }
        nav .brand { font-weight: 600; font-size: 1.05rem; color: var(--text-primary); }
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        nav a:hover { background: var(--accent); color: #1a1a1a; }
        nav .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }

        .theme-switch { display: flex; gap: 0.5rem; }
        .theme-switch button {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .theme-switch button:hover { background: var(--accent); color: #fff; }

        .card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
        }
        .card h2 {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .card .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .problem-item {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
            margin: 3px 4px 3px 0;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .problem-item.AC { background: var(--success); color: #fff; border-color: var(--success); }
        .problem-item.WA { background: var(--danger); color: #fff; border-color: var(--danger); }
        .problem-item.Other { background: var(--bg-primary); color: var(--text-secondary); border-color: var(--border); }

        .tag-badge {
            display: inline-block;
            background: var(--bg-glass);
            color: var(--text-secondary);
            padding: 1px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            margin-left: 4px;
            border: 1px solid var(--border);
        }
        .difficulty-badge {
            display: inline-block;
            font-size: 0.65rem;
            margin-left: 4px;
            padding: 1px 6px;
            border-radius: 3px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        details.contest-detail {
            margin-top: 8px;
            padding: 8px 12px;
            background: var(--bg-primary);
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        details.contest-detail summary {
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        details.contest-detail summary .contest-name { font-weight: 500; color: var(--text-primary); }
        details.contest-detail summary span { font-weight: 400; font-size: 0.85rem; color: var(--text-secondary); }
        details.contest-detail .elo-change.positive { color: var(--success); }
        details.contest-detail .elo-change.negative { color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .loading .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 8px;
        }
        .stats-summary .stat-item {
            background: var(--bg-primary);
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .stats-summary .stat-item .num { font-weight: 600; color: var(--accent); }

        @media (max-width: 768px) {
            body { padding: 16px; }
            nav { flex-direction: column; gap: 0.6rem; align-items: stretch; }
            nav .nav-links { justify-content: center; flex-wrap: wrap; }
            .theme-switch { justify-content: center; }
            details.contest-detail summary { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <span class="brand">📅 比赛详情</span>
        <div class="nav-links">
            <a href="/">📊 分析面板</a>
            <a href="/static/chat.html">💬 AI 教练</a>
            <a href="/static/wrong.html">📕 错题本</a>
            <div class="theme-switch">
                <button onclick="setTheme('light')">☀️</button>
                <button onclick="setTheme('dark')">🌙</button>
            </div>
        </div>
    </nav>

    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            <div>加载数据中...</div>
        </div>
    </div>
</div>

<script>
    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem('oi-theme', theme);
    }
    document.body.className = localStorage.getItem('oi-theme') || 'dark';

    function renderContestList(contests, platform) {
        if (!contests || contests.length === 0) {
            return `<div class="empty-state" style="padding:20px;">暂无 ${platform} 比赛记录</div>`;
        }

        // 计算平台统计
        let totalAC = 0, totalProblems = 0;
        for (const c of contests) {
            const problems = c.problems || {};
            // 统一转换为数组，并确保 pid 字段存在
            const problemList = Array.isArray(problems)
                ? problems.map(p => ({ ...p, pid: p.pid || '?' }))
                : Object.entries(problems).map(([pid, info]) => ({ ...info, pid }));
            const ac = problemList.filter(p => p.status === 'AC').length;
            const total = c.total_problems || problemList.length;
            totalAC += ac;
            totalProblems += total;
        }
        const totalRate = totalProblems > 0 ? (totalAC / totalProblems * 100).toFixed(1) : 0;

        let html = `
            <div class="card">
                <h2>📅 ${platform} 比赛详情</h2>
                <div class="subtitle">共 ${contests.length} 场比赛</div>
                <div class="stats-summary">
                    <span class="stat-item">📊 通过率 <span class="num">${totalRate}%</span></span>
                    <span class="stat-item">✅ AC 题数 <span class="num">${totalAC}</span></span>
                    <span class="stat-item">📝 总题数 <span class="num">${totalProblems}</span></span>
                </div>
            </div>
            <div class="card">
                <h2>📋 比赛列表</h2>
        `;

        for (const c of contests) {
            const problems = c.problems || {};
            // 统一转换为数组，并确保 pid 字段存在
            const problemList = Array.isArray(problems)
                ? problems.map(p => ({ ...p, pid: p.pid || '?' }))
                : Object.entries(problems).map(([pid, info]) => ({ ...info, pid }));

            const ac = problemList.filter(p => p.status === 'AC').length;
            const total = c.total_problems || problemList.length;
            const change = c.elo_change || 0;
            const changeStr = change > 0 ? `+${change}` : change;
            const changeClass = change > 0 ? 'positive' : change < 0 ? 'negative' : '';

            const tagCount = {};
            problemList.forEach(p => {
                (p.tags || []).forEach(tag => {
                    tagCount[tag] = (tagCount[tag] || 0) + 1;
                });
            });
            const tagSummary = Object.entries(tagCount).sort((a,b) => b[1]-a[1]).slice(0,5);

            html += `
                <details class="contest-detail">
                    <summary>
                        <span class="contest-name">${c.contest_name || `比赛 ${c.contest_id}`}</span>
                        <span>
                            AC ${ac}/${total} 题
                            ${change !== 0 ? `｜等级分 <span class="elo-change ${changeClass}">${changeStr}</span>` : ''}
                        </span>
                    </summary>
                    <div style="margin-top:8px;">
                        <div style="display:flex;flex-wrap:wrap;gap:4px;">
                            ${problemList.map(p => `
                                <span class="problem-item ${p.status === 'AC' ? 'AC' : p.status === 'WA' ? 'WA' : 'Other'}">
                                    ${p.pid} ${p.status}
                                    ${p.difficulty && p.difficulty !== '暂无评定' ? `<span class="difficulty-badge">${p.difficulty}</span>` : ''}
                                    ${(p.tags || []).slice(0,3).map(t => `<span class="tag-badge">${t}</span>`).join('')}
                                </span>
                            `).join('')}
                            ${problemList.length === 0 ? '<span style="color:var(--text-secondary);font-size:0.85rem;">无提交记录</span>' : ''}
                        </div>
                        ${tagSummary.length ? `<div style="margin-top:6px;font-size:0.8rem;color:var(--text-secondary);">知识点：${tagSummary.map(([tag,count]) => `${tag}(${count})`).join('、')}</div>` : ''}
                    </div>
                </details>
            `;
        }

        html += `</div>`;
        return html;
    }

    function render(data) {
        const container = document.getElementById('content');
        const luoguContests = data.luogu_contests || [];
        const atcoderContests = data.atcoder_contests || [];

        if (!luoguContests.length && !atcoderContests.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="emoji">📊</div>
                    <h2>暂无比赛数据</h2>
                    <p style="color:var(--text-secondary);">请先在 <a href="/" style="color:var(--accent);">分析面板</a> 运行分析</p>
                </div>
            `;
            return;
        }

        let html = '';
        html += renderContestList(luoguContests, '洛谷');
        html += renderContestList(atcoderContests, 'AtCoder');
        container.innerHTML = html;
    }

    async function loadData() {
        try {
            const cached = localStorage.getItem('oi_last_result');
            if (cached) {
                const data = JSON.parse(cached);
                if (data.luogu_contests || data.atcoder_contests) {
                    render(data);
                    return;
                }
            }

            const resp = await fetch('/data/result.json');
            if (!resp.ok) {
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📊</div>
                        <h2>暂无数据</h2>
                        <p style="color:var(--text-secondary);">请先在 <a href="/" style="color:var(--accent);">分析面板</a> 运行分析</p>
                    </div>
                `;
                return;
            }
            const data = await resp.json();
            render(data);
        } catch (e) {
            document.getElementById('content').innerHTML = `
                <div class="empty-state">
                    <div class="emoji">⚠️</div>
                    <h2>加载失败</h2>
                    <p style="color:var(--text-secondary);">${e.message}</p>
                    <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:8px;">请先在分析面板运行分析</p>
                </div>
            `;
        }
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>

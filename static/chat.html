<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 教练 · 对话</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }
        body.light {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255,255,255,0.7);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border: #e2e8f0;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --accent: #b8963a;
            --accent-hover: #d4b86a;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-glass: rgba(30,41,59,0.8);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            --accent: #b8963a;
            --accent-hover: #d4b86a;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 900px; margin: 0 auto; }

        nav {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-radius: 8px;
            padding: 0.8rem 1.8rem;
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
        }
        nav .brand { font-weight: 600; font-size: 1.05rem; color: var(--text-primary); }
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            transition: 0.2s;
        }
        nav a:hover { background: var(--accent); color: #1a1a1a; }

        .theme-switch { display: flex; gap: 0.5rem; }
        .theme-switch button {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .theme-switch button:hover { background: var(--accent); color: #fff; }

        .chat-container {
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            min-height: 400px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: var(--bg-primary);
        }
        .chat-messages .message { margin-bottom: 16px; display: flex; flex-direction: column; }
        .chat-messages .message.user { align-items: flex-end; }
        .chat-messages .message.assistant { align-items: flex-start; }

        .chat-messages .bubble {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            line-height: 1.6;
            word-wrap: break-word;
        }
        .chat-messages .message.user .bubble {
            background: var(--accent);
            color: #1a1a1a;
            border: none;
        }
        .chat-messages .bubble pre {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .chat-messages .bubble code { font-family: 'Consolas', monospace; font-size: 0.9rem; }
        .chat-messages .bubble p { margin: 6px 0; }
        .chat-messages .bubble ul, .chat-messages .bubble ol { padding-left: 20px; }

        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            background: var(--bg-secondary);
        }
        .chat-input-area textarea {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            min-height: 50px;
            max-height: 150px;
            transition: 0.2s;
        }
        .chat-input-area textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,150,58,0.15); }
        .chat-input-area button {
            padding: 0 24px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #1a1a1a;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .chat-input-area button:hover { background: var(--accent-hover); }
        .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%,80%,100%{ transform:scale(0); } 40%{ transform:scale(1); } }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }

        .api-key-bar {
            display: flex;
            gap: 10px;
            padding: 10px 24px;
            align-items: center;
            background: var(--bg-glass);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .api-key-bar label { color: var(--text-secondary); font-size: 0.9rem; white-space: nowrap; }
        .api-key-bar input {
            flex: 1;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
            font-size: 0.9rem;
            min-width: 120px;
        }
        .api-key-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,150,58,0.15); }
        .api-key-bar .hint { color: var(--text-secondary); font-size: 0.8rem; }

        @media (max-width: 768px) {
            body { padding: 16px; }
            .chat-container { height: calc(100vh - 160px); }
            .chat-input-area { flex-wrap: wrap; }
            .chat-input-area textarea { min-height: 40px; }
            .chat-messages .bubble { max-width: 95%; }
            .api-key-bar { flex-direction: column; align-items: stretch; gap: 6px; }
            .api-key-bar .hint { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <span class="brand">🧠 AI 教练</span>
        <div style="display:flex; gap:1rem; align-items:center;">
            <a href="/">← 返回分析面板</a>
            <div class="theme-switch">
                <button onclick="setTheme('light')">☀️</button>
                <button onclick="setTheme('dark')">🌙</button>
            </div>
        </div>
    </nav>

    <div class="chat-container">
        <div class="api-key-bar">
            <label>🔑 API Key：</label>
            <input type="password" id="chatApiKey" placeholder="选填，留空则使用默认" />
            <span class="hint">可在 DeepSeek 官网获取</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                💡 输入问题，AI 将基于你的训练数据为你解答<br>
                <span style="font-size:0.85rem;">支持 Markdown 格式</span>
            </div>
        </div>
        <div class="chat-input-area">
            <textarea id="chatInput" rows="1" placeholder="例如：我 DP 为什么总错？"></textarea>
            <button id="chatSendBtn">发送</button>
        </div>
    </div>
</div>

<script>
    function setTheme(theme) {
        document.body.className = theme;
        localStorage.setItem('oi-theme', theme);
    }
    document.body.className = localStorage.getItem('oi-theme') || 'dark';

    const messagesContainer = document.getElementById('chatMessages');
    const inputText = document.getElementById('chatInput');
    const sendBtn = document.getElementById('chatSendBtn');
    const apiKeyInput = document.getElementById('chatApiKey');

    let isStreaming = false;

    inputText.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    function appendMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (role === 'assistant') {
            bubble.innerHTML = marked.parse(content);
            bubble.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        } else {
            bubble.textContent = content;
        }
        msgDiv.appendChild(bubble);
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        return bubble;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'typing-indicator';
        div.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    async function sendMessage() {
        const message = inputText.value.trim();
        if (!message || isStreaming) return;
        inputText.value = '';
        inputText.style.height = 'auto';

        const empty = messagesContainer.querySelector('.empty-state');
        if (empty) empty.remove();

        const apiKey = apiKeyInput.value.trim();

        appendMessage('user', message);
        sendBtn.disabled = true;
        inputText.disabled = true;
        isStreaming = true;
        showTyping();

        try {
            const response = await fetch('/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, api_key: apiKey })
            });

            if (!response.ok) {
                const err = await response.json();
                removeTyping();
                appendMessage('assistant', `⚠️ 错误：${err.error || '未知错误'}`);
                return;
            }

            removeTyping();

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.appendChild(bubble);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            let fullContent = '';
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        if (dataStr === '[DONE]') continue;
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.error) {
                                bubble.textContent = `⚠️ ${data.error}`;
                                break;
                            }
                            if (data.content) {
                                fullContent += data.content;
                                bubble.innerHTML = marked.parse(fullContent);
                                bubble.querySelectorAll('pre code').forEach((block) => {
                                    hljs.highlightElement(block);
                                });
                                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            }

            bubble.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

        } catch (e) {
            removeTyping();
            appendMessage('assistant', `⚠️ 请求失败：${e.message}`);
        } finally {
            sendBtn.disabled = false;
            inputText.disabled = false;
            isStreaming = false;
            inputText.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputText.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    inputText.focus();
</script>
</body>
</html>
